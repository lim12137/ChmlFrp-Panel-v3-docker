# ChmlFrp Docker 管理面板 - 生产环境配置
# Author: linluo
# 防盗标识: linluo

services:
  chmlfrp-panel:
    image: ghcr.io/lim12137/chmlfrp-panel:latest
    container_name: chmlfrp-panel
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8888}:80"
      - "${BACKEND_PORT:-3001}:3001"
      - "${FRPS_PORT:-7000}:7000"
      - "${FRPC_DASHBOARD_PORT:-7400}:7400"
      - "${FRPS_DASHBOARD_PORT:-7500}:7500"
    environment:
      NODE_ENV: production
      PORT: 3001
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CHMLFRP_API_BASE: ${CHMLFRP_API_BASE:-http://cf-v2.uapis.cn}
    volumes:
      - chmlfrp-data:/app/data
      - chmlfrp-configs:/app/configs
      - chmlfrp-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/check_login_status >/dev/null 2>&1 && wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      com.docker.compose.project: chmlfrp
      maintainer: linluo
      description: ChmlFrp Docker Management Panel

volumes:
  chmlfrp-data:
  chmlfrp-configs:
  chmlfrp-logs:
